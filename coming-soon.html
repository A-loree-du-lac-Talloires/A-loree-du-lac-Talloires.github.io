<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>À l'Orée du Lac — Talloires, Lac d'Annecy</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  background:linear-gradient(160deg,#1A4A62 0%,#0D2E40 60%,#061820 100%);
  display:flex;align-items:center;justify-content:center;
  padding:2rem;
  position:relative;overflow:hidden;
}

/* Cercles décoratifs */
body::before{
  content:'';position:absolute;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(42,110,140,0.25) 0%,transparent 70%);
  top:-100px;right:-100px;pointer-events:none;
}
body::after{
  content:'';position:absolute;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(42,110,140,0.15) 0%,transparent 70%);
  bottom:-80px;left:-80px;pointer-events:none;
}

.card{
  position:relative;z-index:1;
  max-width:520px;width:100%;
  text-align:center;
  animation:fadeUp 0.8s ease both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}

.location-pill{
  display:inline-flex;align-items:center;gap:0.5rem;
  background:rgba(255,255,255,0.08);
  border:0.5px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.7);
  font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;
  padding:0.4rem 1rem;border-radius:20px;
  margin-bottom:2rem;
}

.logo{
  font-family:'Libre Baskerville',serif;
  font-size:clamp(2rem,6vw,3.2rem);
  color:white;line-height:1.15;
  margin-bottom:0.8rem;
}
.logo em{font-style:italic;color:#7EC8E8}

.tagline{
  font-size:1rem;font-weight:300;
  color:rgba(255,255,255,0.55);
  line-height:1.8;margin-bottom:2.5rem;
}

.divider{
  width:40px;height:1px;
  background:rgba(255,255,255,0.2);
  margin:0 auto 2.5rem;
}

.message{
  font-family:'Libre Baskerville',serif;
  font-size:1.1rem;font-style:italic;
  color:rgba(255,255,255,0.85);
  line-height:1.7;margin-bottom:2.5rem;
}

.contact-label{
  font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(255,255,255,0.35);margin-bottom:0.8rem;
}

.contact-link{
  display:inline-flex;align-items:center;gap:0.6rem;
  color:white;text-decoration:none;
  font-size:0.9rem;font-weight:400;
  border-bottom:0.5px solid rgba(255,255,255,0.25);
  padding-bottom:3px;
  transition:border-color 0.2s,color 0.2s;
}
.contact-link:hover{color:#7EC8E8;border-color:#7EC8E8}

.contact-link svg{opacity:0.6;flex-shrink:0}

.stars{
  margin-top:3rem;
  color:rgba(255,255,255,0.2);
  font-size:0.75rem;letter-spacing:0.3em;
}

/* Lang switch */
.lang-switch{
  position:fixed;top:1.5rem;right:1.5rem;
  display:flex;border:0.5px solid rgba(255,255,255,0.2);
  border-radius:20px;overflow:hidden;z-index:10;
}
.lang-btn{
  padding:0.3rem 0.8rem;font-size:0.72rem;font-weight:500;
  cursor:pointer;background:none;border:none;
  color:rgba(255,255,255,0.45);
  transition:all 0.2s;font-family:'Outfit',sans-serif;
}
.lang-btn.active{background:rgba(255,255,255,0.12);color:white}
.lang-btn:hover:not(.active){color:rgba(255,255,255,0.7)}
</style>
</head>
<body>

<div class="lang-switch">
  <button class="lang-btn active" onclick="setLang('fr')">FR</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<div class="card">
  <div class="location-pill" id="pill">📍 Angon · Talloires · Lac d'Annecy</div>

  <h1 class="logo">À l'<em>Orée</em> du Lac</h1>

  <p class="tagline" id="tagline">
    Appartement ★★★ · 150m du lac d'Annecy<br>Terrasse plein sud-ouest · 4 personnes + bébé
  </p>

  <div class="divider"></div>

  <p class="message" id="message">
    Notre site est en cours de création.<br>
    Revenez bientôt !
  </p>

  <p class="contact-label" id="contactLabel">Pour réserver ou poser une question</p>

  <a href="mailto:oree.du.lac.talloires@gmail.com" class="contact-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="white"/></svg>
    oree.du.lac.talloires@gmail.com
  </a>

  <div class="stars">★★★★★</div>
</div>

<script>
const T = {
  fr: {
    pill: '📍 Angon · Talloires · Lac d\'Annecy',
    tagline: 'Appartement ★★★ · 150m du lac d\'Annecy<br>Terrasse plein sud-ouest · 4 personnes + bébé',
    message: 'Notre site est en cours de création.<br>Revenez bientôt !',
    contactLabel: 'Pour réserver ou poser une question'
  },
  en: {
    pill: '📍 Angon · Talloires · Lake Annecy',
    tagline: 'Apartment ★★★ · 150m from Lake Annecy<br>South-west terrace · 4 guests + baby',
    message: 'Our website is coming soon.<br>Check back shortly!',
    contactLabel: 'To book or ask a question'
  }
};

function setLang(lang) {
  const t = T[lang];
  document.getElementById('pill').textContent = t.pill;
  document.getElementById('tagline').innerHTML = t.tagline;
  document.getElementById('message').innerHTML = t.message;
  document.getElementById('contactLabel').textContent = t.contactLabel;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === lang.toUpperCase());
  });
}
</script>
</body>
</html>
